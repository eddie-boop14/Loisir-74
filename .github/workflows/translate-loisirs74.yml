name: Translate loisirs74 (batch, manual)

# ▶️  Run it: Actions tab → "Translate loisirs74 (batch, manual)" → Run workflow
#
# HANDOFF-25/26: per-language prose translation through the Anthropic
# Message Batches API (scripts/translate_batch.py).
#
# ⚠️ MANUAL-ONLY — NEVER add a cron (2026-07-01's lesson). And NEVER a
# submit without Eddie's explicit per-language "go" after seeing the
# dry-run numbers (HANDOFF-26 step 4): the dry-run number is the contract.
#
# Modes:
#   dry-run — presence-check the ANTHROPIC_API_KEY secret (never echoed)
#             + print request count / token / $ estimate. Zero cost.
#   submit  — the paid run: submit, poll (typically 1–2h, SLA 24h),
#             validate every result, write i18n.<lang> back, and push the
#             changes to branch  claude/<lang>-prose-batch  for PR review.
#             NOTHING is pushed to main by this workflow.

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Target language"
        required: true
        type: choice
        options: [pt, cs, ja, ar, he, pl]
      mode:
        description: "dry-run (free, estimate) · submit (paid Sonnet batch — Eddie's explicit go) · recover (FREE: re-read already-paid batch results; dispatch ON the lang's prose-batch branch) · audit (FREE: HANDOFF-35 cost reconciliation) · local-mt (FREE: HANDOFF-37 $0 argos MT lane → claude/<lang>-mt-prose) · patch-dry-run (FREE: Haiku patch contract from the flags file; dispatch ON the mt-prose branch) · patch-submit (PAID ≤$2 cap — Eddie saw the contract; dispatch ON the mt-prose branch)"
        required: true
        type: choice
        options: [dry-run, submit, recover, audit, local-mt, patch-dry-run, patch-submit]
        default: dry-run

permissions:
  contents: write   # submit mode pushes the result branch

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # poll headroom; batches typically land in 1–2h
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history: the plain (no -f) MT-lane push must
                           # prove fast-forward against existing claude/*
                           # branches (the AXIS runs died on this exact class)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Presence-check ANTHROPIC_API_KEY (never echoed)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          case "${{ inputs.mode }}" in
            dry-run|local-mt|patch-dry-run) NEEDS_KEY=no ;;   # $0 modes
            *) NEEDS_KEY=yes ;;
          esac
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY repo secret is NOT set — do HANDOFF-26 steps 1-2 (Console key + repo secret) first."
            if [ "$NEEDS_KEY" = "yes" ]; then exit 1; fi
            echo "($0-mode continues — no key needed)"
          else
            echo "ANTHROPIC_API_KEY is set (length ${#ANTHROPIC_API_KEY}; value never printed)."
          fi

      - name: Dry-run — request count + token/cost estimate (zero cost)
        if: contains(fromJSON('["dry-run","submit","recover"]'), inputs.mode)
        run: python3 scripts/translate_batch.py --lang "${{ inputs.lang }}" --dry-run

      - name: Install Anthropic SDK
        if: contains(fromJSON('["submit","recover","audit","patch-submit"]'), inputs.mode)
        run: pip install anthropic

      - name: Local MT — the $0 lane (HANDOFF-37, no API key, argos models)
        # Downloads the en→<lang> argos model (~200 MB) and translates every
        # missing prose field locally. Segments with mangled placeholders /
        # digits / ratios are FLAGGED (fields stay absent, null discipline)
        # into reports/translate-local-flags-<lang>.json for the patch tier.
        if: inputs.mode == 'local-mt'
        run: |
          pip install argostranslate
          python3 scripts/translate_local.py --lang "${{ inputs.lang }}"

      - name: Patch contract — Haiku on FLAGGED SEGMENTS only ($0 preview)
        # Dispatch ON claude/<lang>-mt-prose (the flags file lives there).
        if: inputs.mode == 'patch-dry-run'
        run: python3 scripts/translate_local.py --lang "${{ inputs.lang }}" --patch-dry-run

      - name: Patch submit — PAID, ≤$2/lang hard cap (Eddie saw the contract)
        # Dispatch ON claude/<lang>-mt-prose. HANDOFF-35 meter applies.
        if: inputs.mode == 'patch-submit'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/translate_local.py --lang "${{ inputs.lang }}" --patch-submit

      - name: Submit + poll + validate + write back (PAID — Eddie approved the dry-run number)
        if: inputs.mode == 'submit'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/translate_batch.py --lang "${{ inputs.lang }}"

      - name: Recover — re-read already-paid batch results with the hardened parser ($0)
        # Dispatch this ON the claude/<lang>-prose-batch branch: the state file
        # holding the batch ids lives there, and results are pushed back to it.
        # Results retrieval is free; NOTHING is submitted in this mode.
        if: inputs.mode == 'recover'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/translate_batch.py --lang "${{ inputs.lang }}" --recover

      - name: Audit — reconcile actual $ vs contracts from paid batches ($0, HANDOFF-35)
        # Re-reads every ended batch's per-request usage (retrieval is FREE,
        # nothing is submitted) and writes the reconciliation report + the
        # estimator calibration. Dispatch on main; lang input is ignored.
        if: inputs.mode == 'audit'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/translate_batch.py --lang "${{ inputs.lang }}" --audit

      - name: Push results to a review branch (never main)
        # always(): a submit that goes RED on the >15% meter (HANDOFF-35) has
        # still PAID for its results — they must land on the branch either way.
        if: always() && inputs.mode != 'dry-run'
        run: |
          git config user.name "loisirs74-bot"
          git config user.email "bot@loisirs74.fr"
          FORCE="-f"
          case "${{ inputs.mode }}" in
            audit)
              BRANCH="claude/cost-audit"
              MSG="report: translation cost reconciliation + estimator calibration (HANDOFF-35)" ;;
            local-mt|patch-dry-run|patch-submit)
              # HANDOFF-37 acceptance: plain push (no -f) on the MT lane
              BRANCH="claude/${{ inputs.lang }}-mt-prose"
              FORCE=""
              MSG="feat(i18n): ${{ inputs.lang }} prose via \$0 local MT lane (HANDOFF-37, mode ${{ inputs.mode }})" ;;
            *)
              BRANCH="claude/${{ inputs.lang }}-prose-batch"
              MSG="feat(i18n): ${{ inputs.lang }} prose via batch translation (HANDOFF-25/26)" ;;
          esac
          # COMMIT FIRST (the paid results live as modifications on main's
          # tree — never risk a checkout clobbering them), THEN reconcile
          # with any existing remote branch so the plain push fast-forwards.
          # Merged lanes leave ancestor branches behind: with the full-depth
          # clone those are already contained → merge is a no-op.
          git checkout -B "$BRANCH"
          git add Json/ reports/translate-batch-state.json reports/translate-batch-failures.md \
                  reports/translate-cost-reconciliation.md reports/translate-cost-calibration.json \
                  reports/translate-local-flags-*.json 2>/dev/null || true
          git commit -m "$MSG" || { echo "nothing to commit"; exit 0; }
          if [ -z "$FORCE" ] && git fetch origin "$BRANCH" 2>/dev/null; then
            git merge --no-edit FETCH_HEAD || {
              git merge --abort
              BRANCH="${BRANCH}-$(date +%Y%m%d%H%M)"
              echo "remote branch diverged with conflicts — pushing to $BRANCH instead (nothing lost, nothing forced)"
            }
          fi
          git push $FORCE -u origin "$BRANCH"
          echo "Pushed $BRANCH — open a PR for Eddie's review."
