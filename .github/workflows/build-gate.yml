name: Build gate (loisirs74)

# Runs build_all on every push to main and every PR. Asserts:
#   - status_gate         every fiche has explicit status field
#   - hygiene_gate        0 Tier-1/2 scaffolding leaks
#   - fiche render        all 392 × 6 = 2352 HTMLs produced
#   - catalog_index       regenerated
#   - hubs                regenerated from JSON
#   - placement_gate      protected fiches (chez-nous-a-la-plage, chalet-du-tornet) hosts preserved
#   - card-diff gate      protected partner cards byte-faithful vs snapshot
#   - reachability        0 orphans across all 6 locales
#   - byte-stable double  two consecutive builds produce md5-identical HTMLs
#
# Any failure blocks the build → Netlify (or any deploy) sees red.
# This is the structural defence against the mutation-chain disease
# returning: every push must produce a clean, idempotent, reachable tree.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # gate_no_key_drop compares each fiche against HEAD~1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: No-silent-key-drop gate
        # Fail if any Json/<slug>.json lost a top-level key, an i18n locale, or a
        # per-locale key vs HEAD~1 (SPEC studio-data-safety §4.4). Read-only, fast.
        # Intentional removals go through reports/key-drop-allowlist.txt.
        run: python3 scripts/gate_no_key_drop.py

      - name: Studio patch ingress self-test
        run: python3 tests/test_apply_studio_patch.py

      - name: Run build_all (every gate inside)
        run: python3 scripts/build_all.py --no-site

      - name: Byte-stable double build
        # Build_all has just run. Snapshot, rebuild, diff.
        run: |
          tree_files=(*.html en/*.html de/*.html it/*.html es/*.html nl/*.html \
                      cascades/*.html chateaux/*.html musees/*.html sentiers/*.html \
                      points-de-vue/*.html telecabines/*.html voies-vertes/*.html \
                      lacs-plages/*.html bases-de-loisirs/*.html parcs-jardins/*.html \
                      baignade-nautisme/*.html sorties-detente/*.html sport-jeux/*.html)
          md5sum "${tree_files[@]}" 2>/dev/null | sort > /tmp/h1.txt
          python3 scripts/build_all.py --no-site > /dev/null
          md5sum "${tree_files[@]}" 2>/dev/null | sort > /tmp/h2.txt
          if ! diff -q /tmp/h1.txt /tmp/h2.txt >/dev/null; then
            echo "::error::Build is not byte-stable across cycles"
            diff /tmp/h1.txt /tmp/h2.txt | head -20
            exit 1
          fi
          echo "✓ byte-stable: $(wc -l < /tmp/h1.txt) HTMLs identical across two consecutive builds"

      - name: Build _site/ (publish target)
        run: python3 scripts/build_site.py

      - name: Assert _site/ research_log strip
        run: |
          leaks=$(grep -rl 'research_log' _site/Json/ _site/api/ _site/content/ 2>/dev/null | wc -l)
          if [ "$leaks" -gt 0 ]; then
            echo "::error::research_log leaked into $leaks public exports"
            exit 1
          fi
          echo "✓ no research_log in public exports"

      - name: Assert _site/ leak surface closed
        run: |
          # JOB 2's allowlist should never readmit these
          leaks=""
          for f in audit-report.md "loisirs74-cascade-de-la-diomaz (1).zip" \
                   report.csv email_queue.csv _README.txt apply-images.py; do
            if [ -e "_site/$f" ]; then leaks="$leaks $f"; fi
          done
          if [ -n "$leaks" ]; then
            echo "::error::leak surface re-opened:$leaks"
            exit 1
          fi
          echo "✓ leak surface closed"

      - name: Upload _site/ as artifact (optional review)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: _site/
          retention-days: 7
          if-no-files-found: error
