name: Build gate (loisirs74)

# Runs build_all on every push to main and every PR. Asserts:
#   - status_gate         every fiche has explicit status field
#   - hygiene_gate        0 Tier-1/2 scaffolding leaks
#   - fiche render        all 392 x 6 = 2352 HTMLs produced
#   - catalog_index       regenerated
#   - hubs                regenerated from JSON
#   - placement_gate      protected fiches (chez-nous-a-la-plage, chalet-du-tornet) hosts preserved
#   - card-diff gate      protected partner cards byte-faithful vs snapshot
#   - reachability        0 orphans across all 6 locales
#   - byte-stable double  two consecutive builds produce md5-identical HTMLs
#
# Any failure blocks the build -> Netlify (or any deploy) sees red.
# This is the structural defence against the mutation-chain disease
# returning: every push must produce a clean, idempotent, reachable tree.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history: push 'before' / PR base must resolve

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute key-drop baseline
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
            case "$BASE" in 0000000000000000000000000000000000000000|"") BASE="HEAD~1" ;; esac
          fi
          echo "BASE=$BASE" >> "$GITHUB_ENV"
          echo "key-drop baseline = $BASE"

      - name: No-silent-key-drop gate
        run: python3 scripts/gate_no_key_drop.py --base "$BASE"

      - name: Bot-commit sanity gate (no mass deletion of verified fields)
        # HANDOFF-24: the 2026-07-01 dead-key run deleted place_id/hours/
        # website/phone from 397 fiches INSIDE google_check/freshness —
        # below gate_no_key_drop's radar. >20 fiches losing verified
        # fields in one diff = a checker rewriting the world. Red.
        run: python3 scripts/gate_bot_commit_sanity.py --base "$BASE"

      - name: Error≠data + gate tripwire tests (offline)
        # Proves the mass-failure circuit breakers hold: a simulated
        # 100%-failure run changes ZERO Json files and exits non-zero,
        # and a seeded mass-deletion trips gate_bot_commit_sanity.
        run: |
          python3 tests/test_error_is_not_data.py
          python3 tests/test_gate_bot_commit_sanity.py
          python3 tests/test_translate_batch.py
          python3 tests/test_json_repair.py
          python3 tests/test_translate_local.py
          python3 tests/test_translate_push_gitadd.py
          python3 tests/test_gate_facet_layer.py
          python3 tests/test_gate_protected_placements.py
          python3 tests/test_robots_txt.py

      - name: No-orphan-geo-verified gate
        run: python3 scripts/gate_geo_verified.py

      - name: No-duplicate-lieux gate
        run: python3 scripts/gate_no_duplicate_lieux.py

      - name: No-dead-slug-refs gate (indexes point only at live fiches)
        # covers data/*_index.json top-level keys AND nested slug values
        # (_meta included — the HANDOFF-15 hiding spot), seeded-proof tested
        run: |
          python3 tests/test_gate_no_dead_slug_refs.py
          python3 scripts/gate_no_dead_slug_refs.py

      - name: i18n label vocabulary gate (no half-shipped language)
        run: python3 scripts/gate_i18n_labels.py

      - name: Duck-quack coverage gate (every published lang quacks natively)
        # HANDOFF-29: pl/pt/cs published while missing from duck.js's QUACK
        # map → silent 'Coin coin' fallback. Roster vs map, red on any gap.
        run: python3 scripts/gate_duck_quacks.py

      - name: Multi-hub membership gate (valid hubs[], no dilution)
        run: python3 scripts/gate_hubs_membership.py

      - name: Accessibility (PMR) schema gate
        run: python3 scripts/gate_acces_pmr.py

      - name: Venue-centroid gate (fail ≥3 on one point, warn on 2)
        run: python3 scripts/gate_venue_centroid.py

      - name: Translation revert-guard (no payload/Json conflicts)
        run: python3 scripts/ingest_translations.py --check

      - name: Run build_all (every gate inside)
        run: python3 scripts/build_all.py --no-site

      - name: Geolocation live gate (Permissions-Policy + #nearMe scripts)
        # after build_all so the homepages have been patched with nearme.js
        run: python3 scripts/gate_geolocation_live.py

      - name: No-escaped-tags gate (authored prose never renders as &lt;tags&gt;)
        # after build_all so pages are freshly rendered. HANDOFF-23: raw-emit
        # for authored-HTML prose fields; this keeps every current AND future
        # (batch-translated) language off the escaping path.
        run: |
          python3 tests/test_gate_no_escaped_tags.py
          python3 scripts/gate_no_escaped_tags.py

      - name: Meta-uniqueness gate (every page introduces itself — no SERP duplicates)
        # after build_all so pages are freshly rendered. HANDOFF-32: FR titles
        # mirrored into other langs + bare shared commune metas were flagged by
        # Bing (2,369 / 1,343 pages). Facts-derived fallbacks fixed the corpus;
        # this keeps any title/meta from being shared by >3 pages across
        # DIFFERENT content, and any indexable page from shipping meta-less.
        run: |
          python3 tests/test_gate_meta_uniqueness.py
          python3 scripts/gate_meta_uniqueness.py

      - name: Intent-hub registry gate (≥3 members, 6 locales, schema)
        # after build_all so the hub pages have been rendered
        run: python3 scripts/gate_intent_hubs.py

      - name: Intent-nav gate (outbound nav + breadcrumb + placement, all locales)
        # after build_all so the intent pages + hub injections are rendered
        run: python3 scripts/gate_intent_nav.py

      - name: Baignade-cluster gate (L'essentiel + Plages voisines mesh)
        run: python3 scripts/gate_baignade_cluster.py

      - name: AI content layer gate
        # build_all has just regenerated content/<slug>.md (FR+EN) +
        # api/lieu/*.json + llms.txt + llms-full.txt + ai-info.json. Assert
        # every advertised surface exists (0 404s) and counts match the corpus.
        run: python3 scripts/gate_ai_content.py

      - name: Facet-layer STRICT gate (HANDOFF-39A)
        # The agent-parser promise: byte-verbatim heading canon in exact order
        # (FR + EN md) and the 12-key typed JSON contract, nulls preserved,
        # zero fabrication vs Json/ truth. Seeded-defect proof runs in the
        # offline test block above.
        run: python3 scripts/gate_facet_layer.py

      - name: Facet-hubs gate (HANDOFF-facet-hubs — inverted facet layer)
        # Derived membership (api non-null / is_free true, published only),
        # displayed values byte-equal the source projection, info-framed titles,
        # honest md-mirror counts. Pairs with the protected/canonical/byte-stable
        # steps below.
        run: python3 scripts/gate_facet_hubs.py

      - name: Access-cost model gate (one derived state per fiche; no string is_free)
        # HANDOFF-consolidation §2: cost is a single build-derived state
        # {free|free_seasonal|paid}. Fails on a string-typed is_free (the bug that
        # rendered 31 paid stations "Free"), an invalid/absent state, a
        # free_seasonal outside {plage,lac}, or emitted-vs-source drift.
        run: python3 scripts/gate_access_cost.py

      - name: Winter-schema gate (HANDOFF-winter)
        # ## Saison winter bullets only on WINTER_NODES; controlled vocab only
        # (no typos/inference); no subjective snow ratings; equipment line =
        # verified Loi Montagne II constant; Mont-Blanc / Loi Montagne II frozen.
        run: python3 scripts/gate_winter_schema.py

      - name: Protected-placements byte-guard (HANDOFF-39A-B, EVERY run)
        # sha256 of every partner-carrying page vs the committed manifest
        # reports/protected-placements.md. Any drift is red unless an
        # EDMASTER-APPROVED trailer is in the last 20 reachable commits.
        run: python3 scripts/gate_protected_placements.py

      - name: Byte-stable double build
        # Build_all has just run. Snapshot, rebuild, diff.
        run: |
          tree_files=(*.html en/*.html de/*.html it/*.html es/*.html nl/*.html \
                      cascades/*.html chateaux/*.html musees/*.html sentiers/*.html \
                      points-de-vue/*.html telecabines/*.html voies-vertes/*.html \
                      lacs-plages/*.html bases-de-loisirs/*.html parcs-jardins/*.html \
                      baignade-nautisme/*.html sorties-detente/*.html sport-jeux/*.html)
          md5sum "${tree_files[@]}" 2>/dev/null | sort > /tmp/h1.txt
          python3 scripts/build_all.py --no-site > /dev/null
          md5sum "${tree_files[@]}" 2>/dev/null | sort > /tmp/h2.txt
          if ! diff -q /tmp/h1.txt /tmp/h2.txt >/dev/null; then
            echo "::error::Build is not byte-stable across cycles"
            diff /tmp/h1.txt /tmp/h2.txt | head -20
            exit 1
          fi
          echo "[ok] byte-stable: $(wc -l < /tmp/h1.txt) HTMLs identical across two consecutive builds"

      - name: Build _site/ (publish target)
        run: python3 scripts/build_site.py

      - name: Link-integrity gate (no internal 404s in _site/)
        run: python3 scripts/gate_link_integrity.py

      - name: Redirect-shadow gate (no 301 source shadows a built 200 path)
        # HANDOFF-39A-C2: after build_site so it checks the publish tree.
        run: python3 scripts/gate_redirect_shadows.py

      - name: Published-verified gate
        # Read-only. No status:"unverified" fiche may appear in catalog-index.json,
        # api/lieux.json, sitemap.xml, or any hub index.html. No-op while 0 fiches
        # are flagged; it starts enforcing once the source-audit --apply runs.
        run: python3 scripts/gate_published_verified.py

      - name: Canonical self-reference gate
        # Read-only. Every indexable built page must carry exactly one
        # self-referential <link rel="canonical">; md-alts must resolve.
        # Skips 404.html and noindex pages (e.g. studio).
        run: python3 scripts/gate_canonical_selfref.py

      - name: Locale-status gate (only published langs in hreflang/picker; staged-indexable in sitemap only; held render-blocked)
        # Read-only. The roster status model (data/languages.json) is the contract
        # that protects the live originals: a single hreflang scan proves no
        # non-published language leaked into the 6's clusters OR the picker.
        run: python3 scripts/gate_locale_status.py

      - name: Render-mode isolation gate (facts langs never reach the prose path)
        # Read-only. Proves the two-axis lane holds: PROSE/FACTS partition VISIBLE,
        # PUBLISHED stays deleted, and every facts-roster use in a prose/deploy
        # builder is an explicit `# isolation-ok:` decision (picker/hreflang/deploy)
        # — so a careless render loop over a facts lang can't merge.
        run: python3 scripts/gate_render_mode_isolation.py

      - name: i18n FR-leak ratchet (no new FR-scaffold in a non-FR lang)
        # Read-only. A non-FR field byte-identical to i18n.fr (canonical JSON, >60
        # chars) is an untranslated French scaffold served to that language and to
        # Google. The known May-import backlog is baselined (reports/i18n-leak-
        # baseline.json) and only WARNs; ANY leak outside the baseline FAILS the
        # build. The baseline can only shrink (--tighten after each batch) — so the
        # door the May import walked through stays shut.
        run: python3 scripts/gate_i18n_leak.py

      - name: Tarif roster-completeness gate (station facts.tarif in ALL published langs)
        # The "8 vs 12" lesson: a hardcoded LANGS literal drifted from the roster,
        # leaving pl/ja/ar/he (both RTL, both submitted to Bing) empty in
        # facts.tarif while CI stayed green. This fails the build if any published
        # station carries the tarif prose in some published langs but not all.
        run: python3 scripts/gate_tarif_completeness.py

      - name: Lastmod honesty gate (real per-lieu dates, no uniform-stamp anti-pattern)
        # Read-only. data/lastmod.json is derived from git content-commit dates
        # (corpus-wide sweeps excluded) by scripts/derive_lastmod.py and committed
        # so renders are deterministic. This asserts ≥15 distinct dates and that no
        # single date covers >40% of the manifest OR of sitemap.xml — the tripwire
        # against the 4,434-URL uniform stamp this engine replaced.
        run: python3 scripts/derive_lastmod.py --verify

      - name: Render-verified gate (every +render-ai language has a clean Layer A + B report)
        # Read-only + lightweight: validates reports/render-verify-<lang>.json
        # (no browser in CI). The heavy headless-render + vision pass that PRODUCES
        # those reports is scripts/render_verify.py, run on demand. The honest
        # replacement for the +native gate that would never fire (HANDOFF-16).
        run: python3 scripts/gate_render_verified.py

      - name: Assert _site/ research_log strip
        run: |
          leaks=$(grep -rl 'research_log' _site/Json/ _site/api/ _site/content/ 2>/dev/null | wc -l)
          if [ "$leaks" -gt 0 ]; then
            echo "::error::research_log leaked into $leaks public exports"
            exit 1
          fi
          echo "[ok] no research_log in public exports"

      - name: Assert _site/ leak surface closed
        run: |
          # JOB 2's allowlist should never readmit these
          leaks=""
          for f in audit-report.md "loisirs74-cascade-de-la-diomaz (1).zip" \
                   report.csv email_queue.csv _README.txt apply-images.py; do
            if [ -e "_site/$f" ]; then leaks="$leaks $f"; fi
          done
          if [ -n "$leaks" ]; then
            echo "::error::leak surface re-opened:$leaks"
            exit 1
          fi
          echo "[ok] leak surface closed"

      - name: Upload _site/ as artifact (optional review)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: _site/
          retention-days: 7
          if-no-files-found: error
