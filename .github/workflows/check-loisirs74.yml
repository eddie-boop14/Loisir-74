name: Check loisirs74 (Google Maps)

# ▶️  Run it: GitHub app/site → your repo → Actions tab → "Check loisirs74" → Run workflow
#
# ⚠️ MANUAL-ONLY — do not re-add a cron (HANDOFF-24 Job 3).
# On 2026-07-01 the scheduled run executed with a dead Google key and
# overwrote 397 fiches with the error state. A schedule may only return once:
#   (a) Google Cloud billing is fixed (Eddie),
#   (b) the error≠data patches are merged (check_loisirs74.py carries the
#       CHECK_FAILED rule + mass-failure circuit breaker),
#   (c) one supervised manual run has passed clean.
# Even then: at most monthly, with the circuit breaker live.
on:
  workflow_dispatch:        # the manual "play" button

permissions:
  contents: write           # lets it commit report.csv + updated fiches back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run the check
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python check_loisirs74.py

      - name: Commit results
        run: |
          git config user.name "loisirs74-bot"
          git config user.email "bot@loisirs74.fr"
          git add -A
          git commit -m "chore: google check $(date +%F)" || echo "nothing to commit"
          git push
