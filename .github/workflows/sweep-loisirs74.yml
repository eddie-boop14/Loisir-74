name: Sweep loisirs74 (3 sources)

# ▶️  Run it: GitHub app/site → your repo → Actions tab → "Sweep loisirs74" → Run workflow
#
# Triangulates each fiche against:
#   - Google Places (New) — needs secret GOOGLE_MAPS_API_KEY
#   - French business registry (recherche-entreprises.api.gouv.fr — no key needed)
#   - Direct fetch of each fiche's official_site_url
#
# Outputs:
#   - "freshness" block updated inside each Json/<slug>.json  (committed)
#   - report.csv + email_queue.csv  (uploaded as workflow artifacts, NOT committed —
#     they're gitignored locally; download from the run's Summary page)

# ⚠️ MANUAL-ONLY — do not re-add a cron (HANDOFF-24 Job 3).
# On 2026-07-01 the scheduled run executed with a dead Google key and
# overwrote 397 fiches with the error state. A schedule may only return once:
#   (a) Google Cloud billing is fixed (Eddie),
#   (b) the error≠data patches are merged (sweep_loisirs74.py carries the
#       CHECK_FAILED rule + mass-failure circuit breaker),
#   (c) one supervised manual run has passed clean.
# Even then: at most monthly, with the circuit breaker live.
on:
  workflow_dispatch:        # the manual "play" button

permissions:
  contents: write           # lets it commit the updated fiches back

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # 325 fiches × (Google + registry + site fetch) ≈ 15-25 min
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run the sweep
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python sweep_loisirs74.py

      - name: Apply sweep signals to state machine (JOB 8)
        # Reads freshness + google_check blocks; demotes high-confidence
        # CLOSED venues to status=draft; flags ambiguous signals; writes
        # reports/job8-sweep-demotions.md. NEVER silent.
        run: python3 scripts/apply_sweep_signals.py

      - name: Upload report artifacts
        if: always()        # upload even if the script errored partway
        uses: actions/upload-artifact@v4
        with:
          name: sweep-reports-${{ github.run_id }}
          path: |
            report.csv
            email_queue.csv
          if-no-files-found: warn
          retention-days: 90

      - name: Commit fiche updates + demotion report
        run: |
          git config user.name "loisirs74-bot"
          git config user.email "bot@loisirs74.fr"
          # report.csv + email_queue.csv are gitignored so this only stages
          # fiche changes (freshness blocks + any draft demotions) and the
          # JOB 8 report.
          git add Json/ reports/job8-sweep-demotions.md
          git commit -m "chore: sweep $(date +%F)" || echo "nothing to commit"
          git push
