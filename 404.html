<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Loisirs 74</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E🏞️%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d1a0f;--paper:#faf8f3;--cream:#f1ece0;--rule:#e7e1d1;--moss:#2f5740;--moss2:#3b6b4c;--moss-pale:#eef3ef;--gold:#b8822f;--gold-pale:#f0dfc0;--muted:#6a706b;--r:6px;--r-lg:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:#2a2f2b;background:var(--paper);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--gold);text-decoration:none;border-bottom:1px solid transparent;transition:border-color 0.15s}
a:hover{border-bottom-color:var(--gold)}

.topbar{padding:1rem 1.5rem;border-bottom:1px solid var(--rule)}
.brand{display:inline-flex;align-items:center;gap:0.55rem;font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:var(--ink);border-bottom:none}
.brand-mark{width:28px;height:28px;background:var(--moss);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold-pale);font-size:0.9rem}
.brand em{font-style:italic;color:var(--moss);font-weight:500}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem}
.wrap{max-width:540px;text-align:center}
.number{font-family:'Fraunces',serif;font-size:clamp(5rem,18vw,9rem);font-weight:500;color:var(--moss);line-height:0.9;letter-spacing:-0.04em;margin-bottom:1rem}
.number em{font-style:italic;color:var(--gold)}
h1{font-family:'Fraunces',serif;font-size:clamp(1.6rem,3.5vw,2.2rem);font-weight:500;color:var(--ink);line-height:1.15;letter-spacing:-0.02em;margin-bottom:1rem}
p{color:var(--muted);font-size:1rem;line-height:1.65;margin-bottom:1.75rem;max-width:440px;margin-left:auto;margin-right:auto}
.cta{display:inline-block;background:var(--moss);color:#fff;font-size:0.9rem;font-weight:600;padding:0.75rem 1.4rem;border-radius:var(--r);border-bottom:none;transition:background 0.15s,transform 0.15s}
.cta:hover{background:var(--moss2);transform:translateX(2px);border-bottom:none}

footer{text-align:center;padding:1.5rem;font-size:0.78rem;color:var(--muted);border-top:1px solid var(--rule);font-family:'Fraunces',serif;font-style:italic}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="brand">
    <span class="brand-mark" aria-hidden="true">🏞️</span>
    <span>Loisirs <em>74</em></span>
  </a>
</header>

<main>
  <div class="wrap">
    <div class="number">4<em>0</em>4</div>
    <h1>Ce lieu n'existe pas (encore)</h1>
    <p>La page que vous cherchez n'a pas été trouvée. Peut-être une URL mal copiée, ou un lieu qu'on n'a pas encore publié.</p>
    <a href="/" class="cta">← Retour à la liste des lieux</a>
  </div>
</main>

<footer>© 2026 bleu-canard édition, Edmaster &amp; Claudius</footer>

</body>
</html>
