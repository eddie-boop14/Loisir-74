# Netlify configuration for Loisirs 74

[build]
  publish = "_site"
  command = "python3 scripts/build_all.py"
  # HANDOFF-31 credit hygiene: skip the build entirely when a push only
  # touches reports, markdown or docs — none of those reach _site/, so a
  # ~15-credit production build for them is pure waste (259 deploys burned
  # 3,885 credits last cycle). Exit 0 = skip build, exit 1 = build.
  # git diff is against the last DEPLOYED commit ($CACHED_COMMIT_REF).
  ignore = "! git diff --name-only $CACHED_COMMIT_REF $COMMIT_REF | grep -qvE '^(reports/|docs/)|\\.md$'"

# Pretty URLs: serve /slug from /slug.html
[[redirects]]
  from = "/*"
  to = "/:splat.html"
  status = 200
  force = false

# Spanish folder: redirect /*.es.html to /es/:splat for proper routing
[[redirects]]
  from = "/*.es.html"
  to = "/es/:splat"
  status = 200
  force = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"

# Cache static assets aggressively
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JOB 11: Studio + DataTourisme working files removed from the public
# build entirely. They live in the repo for local development
# (open studio.html directly with a file:// URL) but never deploy.
# The /studio/* and /dt-candidates.json header rules they used to need
# have been removed.

# Catalog index — short cache, regenerated after every integration
[[headers]]
  for = "/catalog-index.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# HTML pages: short cache so updates are visible quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"