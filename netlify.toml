# Netlify configuration for Loisirs 74

[build]
  publish = "."

# Pretty URLs: serve /slug from /slug.html
[[redirects]]
  from = "/*"
  to = "/:splat.html"
  status = 200
  force = false

# Spanish folder: redirect /*.es.html to /es/:splat for proper routing
[[redirects]]
  from = "/*.es.html"
  to = "/es/:splat"
  status = 200
  force = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets aggressively
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Studio JS modules — short cache because they change frequently
[[headers]]
  for = "/studio-editor.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/studio-enricher.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/studio-phototheque.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/studio-dt-importer.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# DataTourisme candidate dataset — short cache, refreshed when the
# /tmp/flux/ source is re-ingested.
[[headers]]
  for = "/dt-candidates.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Catalog index — short cache, regenerated after every integration
[[headers]]
  for = "/catalog-index.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# HTML pages: short cache so updates are visible quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"