<script>(()=>{const t=document.querySelectorAll('.reveal, .hammer');if(!('IntersectionObserver' in window)||matchMedia('(prefers-reduced-motion:reduce)').matches){t.forEach(e=>e.classList.add('in'));return}document.querySelectorAll('[data-stagger]').forEach(p=>{[...p.children].forEach((c,i)=>c.style.setProperty('--i',i))});const o=new IntersectionObserver((es,b)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');b.unobserve(e.target)}})},{threshold:.12,rootMargin:'0px 0px -8% 0px'});t.forEach(e=>o.observe(e))})();(()=>{const b=document.getElementById('actionBar');if(!b)return;const h=document.querySelector('.hero');if(!h){b.classList.add('in');return}const o=new IntersectionObserver(([e])=>{b.classList.toggle('in',!e.isIntersecting)},{threshold:0});o.observe(h)})();document.addEventListener('click',e=>{document.querySelectorAll('details.lang-picker[open]').forEach(d=>{if(!d.contains(e.target))d.removeAttribute('open')})});</script>
